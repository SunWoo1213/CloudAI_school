<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-app">
        <h1>To-Do List</h1>
        <div class="input-group">
            <input type="text" id="search-input" placeholder="할 일 검색..." />
        </div>
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요..." />
            <input type="datetime-local" id="due-date-input" />
            <button id="add-btn">Add</button>
        </div>
        <ul id="todo-list"></ul>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const input = document.getElementById('todo-input');
        const dueDateInput = document.getElementById('due-date-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');

        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        let searchQuery = '';

        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        function render() {
            todoList.innerHTML = '';
            
            const filteredTodos = todos.filter(todo => 
                todo.text.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const now = Date.now();
            const ONE_HOUR = 60 * 60 * 1000;
            const TWENTY_FOUR_HOURS = 24 * ONE_HOUR;

            filteredTodos.forEach(todo => {
                let statusClass = '';
                if (!todo.completed && todo.dueDate) {
                    const dueTime = new Date(todo.dueDate).getTime();
                    const timeLeft = dueTime - now;
                    
                    if (timeLeft < 0) {
                        statusClass = 'overdue';
                    } else if (timeLeft < TWENTY_FOUR_HOURS) {
                        statusClass = 'warning';
                    }
                }

                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : statusClass}`;
                
                const checkbox = document.createElement('div');
                checkbox.className = 'checkbox';
                checkbox.onclick = () => toggleTodo(todo.id);
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'todo-content';
                contentDiv.onclick = () => toggleTodo(todo.id);
                
                const span = document.createElement('span');
                span.className = 'todo-text';
                span.textContent = todo.text;
                
                contentDiv.appendChild(span);
                
                if (todo.dueDate) {
                    const dateSpan = document.createElement('span');
                    dateSpan.className = 'todo-date';
                    const displayDate = todo.dueDate.replace('T', ' ');
                    dateSpan.textContent = `마감일: ${displayDate}`;
                    contentDiv.appendChild(dateSpan);
                }
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.innerHTML = '×';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteTodo(todo.id, li);
                };
                
                li.appendChild(checkbox);
                li.appendChild(contentDiv);
                li.appendChild(deleteBtn);
                todoList.appendChild(li);
            });
        }

        function getLogCount() {
            return todos.filter(t => !t.completed).length;
        }

        function addTodo() {
            const text = input.value.trim();
            const dueDate = dueDateInput.value;
            
            if (!text || text === '') {
                alert('할 일을 입력해주세요.');
                return;
            }

            todos.push({
                id: Date.now(),
                text,
                dueDate,
                completed: false
            });
            input.value = '';
            dueDateInput.value = '';
            
            saveTodos();
            console.log(`[추가됨] "${text}" | 남은 할 일: ${getLogCount()}개`);
            render();
        }

        function toggleTodo(id) {
            todos = todos.map(todo => {
                if (todo.id === id) {
                    const newState = !todo.completed;
                    console.log(`[상태변경] "${todo.text}" -> ${newState ? '완료' : '미완료'} | 남은 할 일: ${getLogCount() + (newState ? -1 : 1)}개`);
                    return { ...todo, completed: newState };
                }
                return todo;
            });
            saveTodos();
            render();
        }

        function deleteTodo(id, element) {
            const deletedTodo = todos.find(t => t.id === id);
            
            // Add fadeOut animation before removing
            element.style.animation = 'fadeOut 0.2s ease forwards';
            setTimeout(() => {
                todos = todos.filter(todo => todo.id !== id);
                saveTodos();
                console.log(`[삭제됨] "${deletedTodo ? deletedTodo.text : '알 수 없음'}" | 남은 할 일: ${getLogCount()}개`);
                render();
            }, 200);
        }

        function filterByKeyword(e) {
            searchQuery = e.target.value;
            render();
        }

        searchInput.oninput = filterByKeyword;

        addBtn.onclick = addTodo;
        input.onkeypress = (e) => {
            if (e.key === 'Enter') addTodo();
        };

        // 초기 데이터 렌더링
        render();

        // 1분마다 주기적으로 마감 상태 렌더링
        setInterval(render, 60000);
    </script>
</body>
</html>
